<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — Bookmarks</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="profile-page">
      <div id="loadingState" style="color: var(--muted); font-size: 14px">
        Loading…
      </div>

      <div id="profileContent" style="display: none">
        <p class="profile-handle" id="profileHandle">@handle</p>
        <h1 class="profile-title" id="profileTitle">Bookmarks</h1>

        <div id="profileLinks"></div>

        <div
          id="emptyState"
          style="
            display: none;
            color: var(--muted);
            font-size: 15px;
            margin-top: 40px;
          "
        >
          No public bookmarks yet.
        </div>
      </div>

      <div
        id="notFoundState"
        style="display: none; text-align: center; padding: 80px 0"
      >
        <p style="font-size: 32px; font-weight: 700; letter-spacing: -0.02em">
          404
        </p>
        <p style="color: var(--muted); margin-top: 8px">
          This profile doesn't exist.
        </p>
        <a
          href="/"
          style="
            display: inline-block;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
            text-decoration: underline;
            text-underline-offset: 3px;
          "
          >← Go home</a
        >
      </div>
    </div>

    <script>
      async function loadProfile() {
        // Extract handle from the URL path (e.g. /johndoe → "johndoe")
        const handle = window.location.pathname.replace(/^\//, "");

        try {
          const res = await fetch(`/api/profile/${encodeURIComponent(handle)}`);
          const data = await res.json();

          document.getElementById("loadingState").style.display = "none";

          if (!data.success) {
            document.getElementById("notFoundState").style.display = "block";
            return;
          }

          document.title = `@${data.profile.handle} — Bookmarks`;
          document.getElementById("profileHandle").textContent =
            `@${data.profile.handle}`;
          document.getElementById("profileTitle").textContent =
            `${data.profile.handle}'s bookmarks`;

          const linksEl = document.getElementById("profileLinks");

          if (data.bookmarks.length === 0) {
            document.getElementById("emptyState").style.display = "block";
          } else {
            linksEl.innerHTML = data.bookmarks
              .map((b) => {
                const domain = getDomain(b.url);
                const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
                return `
            <a href="${escHtml(b.url)}" target="_blank" rel="noopener" class="profile-link">
              <img src="${favicon}" width="20" height="20" style="border-radius:4px; flex-shrink:0"
                   alt="" onerror="this.style.display='none'" />
              <div>
                <div class="profile-link-title">${escHtml(b.title)}</div>
                <div class="profile-link-url">${escHtml(domain)}</div>
              </div>
            </a>
          `;
              })
              .join("");
          }

          document.getElementById("profileContent").style.display = "block";
        } catch (err) {
          document.getElementById("loadingState").style.display = "none";
          document.getElementById("notFoundState").style.display = "block";
        }
      }

      function getDomain(url) {
        try {
          return new URL(url).hostname;
        } catch {
          return url;
        }
      }

      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      loadProfile();
    </script>
  </body>
</html>
