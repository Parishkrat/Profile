<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Bookmarks</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-box">
        <div class="auth-logo">bookmarks.app</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to manage your bookmarks.</p>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" />
        </div>

        <button class="btn" id="submitBtn" onclick="handleLogin()">
          Sign in
        </button>

        <div class="msg" id="msg"></div>

        <p class="auth-footer">
          No account? <a href="/register">Create one</a>
        </p>
      </div>
    </div>

    <script>
      const API = "/api/auth";

      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");

        document.getElementById("msg").className = "msg";

        if (!email || !password) {
          showMsg("Email and password are required.", "error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in…";

        try {
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (data.success) {
            window.location.href = "/dashboard";
          } else {
            showMsg(data.message, "error");
            btn.disabled = false;
            btn.textContent = "Sign in";
          }
        } catch (err) {
          showMsg("Network error. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      }

      function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = `msg ${type}`;
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
