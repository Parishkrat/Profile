<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Bookmarks</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-box">
        <div class="auth-logo">bookmarks.app</div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Pick a handle and start saving links.</p>

        <div class="field">
          <label for="handle">Your handle</label>
          <div class="handle-prefix">
            <span>@</span>
            <input
              type="text"
              id="handle"
              placeholder="yourname"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" />
        </div>

        <button class="btn" id="submitBtn" onclick="handleRegister()">
          Create account
        </button>

        <div class="msg" id="msg"></div>

        <p class="auth-footer">
          Already have an account? <a href="/">Sign in</a>
        </p>
      </div>
    </div>

    <script>
      const API = "/api/auth";

      async function handleRegister() {
        const handle = document.getElementById("handle").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");
        const msg = document.getElementById("msg");

        msg.className = "msg";
        msg.textContent = "";

        if (!handle || !email || !password) {
          showMsg("All fields are required.", "error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Creating account…";

        try {
          const res = await fetch(`${API}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ handle, email, password }),
          });
          const data = await res.json();

          if (data.success) {
            showMsg("Account created! Redirecting…", "success");
            setTimeout(() => (window.location.href = "/"), 1500);
          } else {
            showMsg(data.message, "error");
            btn.disabled = false;
            btn.textContent = "Create account";
          }
        } catch (err) {
          showMsg("Network error. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Create account";
        }
      }

      function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = `msg ${type}`;
      }

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleRegister();
      });
    </script>
  </body>
</html>
