<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Bookmarks</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="dash-layout">
      <!-- Header -->
      <header class="dash-header">
        <div class="dash-logo">bookmarks.app</div>
        <div class="dash-user">
          <span class="dash-handle" id="userHandle">@—</span>
          <button class="btn btn-outline btn-sm" onclick="handleLogout()">
            Sign out
          </button>
        </div>
      </header>

      <h1 class="dash-title">Your Bookmarks</h1>
      <p class="dash-sub">
        Add links, set them public to share on your profile.
      </p>

      <!-- Add Bookmark Form -->
      <div class="add-form">
        <div class="add-form-title">Add bookmark</div>

        <div class="form-row">
          <div class="field" style="margin: 0">
            <label for="newTitle">Title</label>
            <input
              type="text"
              id="newTitle"
              placeholder="My favourite article"
            />
          </div>
          <div class="field" style="margin: 0">
            <label for="newUrl">URL</label>
            <input type="url" id="newUrl" placeholder="https://example.com" />
          </div>
        </div>

        <div class="toggle-row">
          <button
            class="toggle"
            id="publicToggle"
            onclick="togglePublic()"
            aria-label="Toggle public"
          ></button>
          <span id="toggleLabel">Private — only you can see this</span>
        </div>

        <button
          class="btn btn-sm"
          style="width: auto; padding: 10px 24px"
          onclick="handleAdd()"
        >
          Add bookmark
        </button>
        <div
          class="msg"
          id="addMsg"
          style="margin-top: 12px; margin-bottom: 0"
        ></div>
      </div>

      <!-- Bookmark List -->
      <div class="section-label" id="listLabel">Your links</div>
      <div class="bookmark-list" id="bookmarkList">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <div class="modal-title">Edit bookmark</div>
        <input type="hidden" id="editId" />
        <div class="field">
          <label for="editTitle">Title</label>
          <input type="text" id="editTitle" placeholder="Title" />
        </div>
        <div class="field">
          <label for="editUrl">URL</label>
          <input type="url" id="editUrl" placeholder="https://" />
        </div>
        <div class="toggle-row">
          <button
            class="toggle"
            id="editToggle"
            onclick="toggleEditPublic()"
            aria-label="Toggle public"
          ></button>
          <span id="editToggleLabel">Private</span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="handleUpdate()">Save changes</button>
        </div>
        <div class="msg" id="editMsg" style="margin-bottom: 0"></div>
      </div>
    </div>

    <script>
      const API = "/api";
      let bookmarks = [];
      let isPublic = false;
      let editIsPublic = false;

      // ── Init ─────────────────────────────────────────────────────────────────
      async function init() {
        // Check auth — redirect if not logged in
        try {
          const res = await fetch(`${API}/auth/me`, { credentials: "include" });
          if (!res.ok) {
            window.location.href = "/";
            return;
          }
          const data = await res.json();
          if (!data.success) {
            window.location.href = "/";
            return;
          }
          document.getElementById("userHandle").textContent =
            `@${data.user.handle}`;
        } catch {
          window.location.href = "/";
          return;
        }
        loadBookmarks();
      }

      async function loadBookmarks() {
        try {
          const res = await fetch(`${API}/bookmarks`, {
            credentials: "include",
          });
          const data = await res.json();
          if (!data.success) {
            window.location.href = "/";
            return;
          }
          bookmarks = data.bookmarks;
          renderBookmarks();
        } catch {
          document.getElementById("bookmarkList").innerHTML =
            '<div class="empty-state">Failed to load bookmarks.</div>';
        }
      }

      // ── Render ────────────────────────────────────────────────────────────────
      function renderBookmarks() {
        const list = document.getElementById("bookmarkList");
        const label = document.getElementById("listLabel");

        if (bookmarks.length === 0) {
          list.innerHTML =
            '<div class="empty-state">No bookmarks yet. Add your first link above.</div>';
          label.textContent = "Your links";
          return;
        }

        label.textContent = `Your links — ${bookmarks.length}`;
        list.innerHTML = bookmarks
          .map((b) => {
            const domain = getDomain(b.url);
            const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
            return `
        <div class="bookmark-item" data-id="${b.id}">
          <img class="bookmark-favicon" src="${favicon}" alt="" onerror="this.style.display='none'" />
          <div class="bookmark-info">
            <div class="bookmark-title">${escHtml(b.title)}</div>
            <div class="bookmark-url">${escHtml(b.url)}</div>
          </div>
          <span class="bookmark-badge ${b.is_public ? "badge-public" : "badge-private"}">
            ${b.is_public ? "public" : "private"}
          </span>
          <div class="bookmark-actions">
            <a href="${escHtml(b.url)}" target="_blank" rel="noopener" class="btn-icon" title="Open">↗</a>
            <button class="btn-icon" onclick="openEdit('${b.id}')" title="Edit">✎</button>
            <button class="btn-icon delete" onclick="handleDelete('${b.id}')" title="Delete">✕</button>
          </div>
        </div>
      `;
          })
          .join("");
      }

      // ── Add ───────────────────────────────────────────────────────────────────
      async function handleAdd() {
        const title = document.getElementById("newTitle").value.trim();
        const url = document.getElementById("newUrl").value.trim();
        clearMsg("addMsg");

        if (!title || !url) {
          showMsg("addMsg", "Title and URL are required.", "error");
          return;
        }

        const res = await fetch(`${API}/bookmarks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ title, url, is_public: isPublic }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById("newTitle").value = "";
          document.getElementById("newUrl").value = "";
          setPublic(false);
          bookmarks.unshift(data.bookmark);
          renderBookmarks();
          showMsg("addMsg", "Bookmark added!", "success");
          setTimeout(() => clearMsg("addMsg"), 2000);
        } else {
          showMsg("addMsg", data.message, "error");
        }
      }

      // ── Delete ────────────────────────────────────────────────────────────────
      async function handleDelete(id) {
        if (!confirm("Delete this bookmark?")) return;
        const res = await fetch(`${API}/bookmarks/${id}`, {
          method: "DELETE",
          credentials: "include",
        });
        const data = await res.json();
        if (data.success) {
          bookmarks = bookmarks.filter((b) => b.id !== id);
          renderBookmarks();
        } else {
          alert(data.message);
        }
      }

      // ── Edit Modal ────────────────────────────────────────────────────────────
      function openEdit(id) {
        const b = bookmarks.find((x) => x.id === id);
        if (!b) return;
        document.getElementById("editId").value = b.id;
        document.getElementById("editTitle").value = b.title;
        document.getElementById("editUrl").value = b.url;
        editIsPublic = b.is_public;
        updateEditToggle();
        clearMsg("editMsg");
        document.getElementById("editModal").classList.add("open");
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("open");
      }

      async function handleUpdate() {
        const id = document.getElementById("editId").value;
        const title = document.getElementById("editTitle").value.trim();
        const url = document.getElementById("editUrl").value.trim();
        clearMsg("editMsg");

        if (!title || !url) {
          showMsg("editMsg", "Title and URL are required.", "error");
          return;
        }

        const res = await fetch(`${API}/bookmarks/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ title, url, is_public: editIsPublic }),
        });
        const data = await res.json();

        if (data.success) {
          const idx = bookmarks.findIndex((b) => b.id === id);
          if (idx !== -1) bookmarks[idx] = data.bookmark;
          renderBookmarks();
          closeModal();
        } else {
          showMsg("editMsg", data.message, "error");
        }
      }

      // ── Toggle helpers ────────────────────────────────────────────────────────
      function togglePublic() {
        setPublic(!isPublic);
      }

      function setPublic(val) {
        isPublic = val;
        const btn = document.getElementById("publicToggle");
        const lbl = document.getElementById("toggleLabel");
        btn.classList.toggle("on", isPublic);
        lbl.textContent = isPublic
          ? "Public — visible on your profile"
          : "Private — only you can see this";
      }

      function toggleEditPublic() {
        editIsPublic = !editIsPublic;
        updateEditToggle();
      }

      function updateEditToggle() {
        const btn = document.getElementById("editToggle");
        const lbl = document.getElementById("editToggleLabel");
        btn.classList.toggle("on", editIsPublic);
        lbl.textContent = editIsPublic
          ? "Public — visible on your profile"
          : "Private";
      }

      // ── Logout ────────────────────────────────────────────────────────────────
      async function handleLogout() {
        await fetch(`${API}/auth/logout`, {
          method: "POST",
          credentials: "include",
        });
        window.location.href = "/";
      }

      // ── Utilities ─────────────────────────────────────────────────────────────
      function getDomain(url) {
        try {
          return new URL(url).hostname;
        } catch {
          return "";
        }
      }

      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg ${type}`;
      }

      function clearMsg(id) {
        const el = document.getElementById(id);
        el.className = "msg";
        el.textContent = "";
      }

      // Close modal on overlay click
      document
        .getElementById("editModal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });

      init();
    </script>
  </body>
</html>
